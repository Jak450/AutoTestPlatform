version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: autotest-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backed/full_database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backed/ui_use_cases_schema_mysql.sql:/docker-entrypoint-initdb.d/02-ui-schema.sql
      - ./backed/test_case_report_schema_mysql.sql:/docker-entrypoint-initdb.d/03-report-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autotest-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backed/AI_Study_Notes
      dockerfile: Dockerfile
    container_name: autotest-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ARK_API_KEY: ${ARK_API_KEY}
      ARK_BASE_URL: ${ARK_BASE_URL}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./AutoTest_fronted
      dockerfile: Dockerfile
    container_name: autotest-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
